<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4PRACTICE1</title>
</head>
<style>
    body{
        background-color: blanchedalmond;
        text-align: center;
    }
    .content{
        background-color: rgb(205, 255, 210);
    }
</style>
<body>
    <div class="content">
    <!--no user input-->
    <h1>Electricity Consumption Classifier</h1>
    <input type="text" id="Electricity" class="form-control" placeholder="kilowatt per hour">
    <button class="btn btn-info" onclick="checkConsumption()">See Consumption</button>
    <script>
        function checkConsumption(){
            var ec = document.getElementById("Electricity").value;

            if(isNaN(ec) || ec < 0 ){
               alert("Invalid")
            }
 else if(ec < 100){
    alert("Lifeline Consumer : Discounted Electricity Ratios");
 }
 
 else if(ec < 201){
    alert("Low Consumption : Normal Resident Rate");
 }
  else if(ec < 301){
    alert("Average Consumption : Typical Electricity Rate");
 }
 else if(ec < 501){
    alert("High Consumption : Higher Electricity Users");
 }
 else {
    alert("Very High Consumption : Heavy Electricity Users"); 
 }
        }
    </script>
    </div>
</body>
</html>
